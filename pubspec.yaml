name: flutter_application_rent
description: Application de gestion de location maison sécurisée (HERKAT RENT)

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # --- PAIEMENT & CONNECTIVITÉ ---
  url_launcher: ^6.1.11        
  connectivity_plus: ^4.0.1    

  # --- BACKEND FIREBASE ---
  firebase_core: ^2.24.2       
  cloud_firestore: ^4.15.0     
  firebase_auth: ^4.16.0       

  # --- GESTION DU BAIL (PDF) & DATES ---
  pdf: ^3.10.3                 
  printing: ^5.11.0            
  intl: ^0.18.1                

  # --- ACCESSIBILITÉ & CACHE ---
  flutter_tts: ^3.8.3          
  shared_preferences: ^2.2.0   

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1 # ✅ Garde bien celui-ci ici

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png

# ✅ CORRECTION ICI : Le nom doit être exactement "flutter_launcher_icons"
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21 
